name: Work item
description: A bounded implementation, architecture, tooling, or documentation change
title: ""
body:
  - type: input
    id: parent
    attributes:
      label: Parent outcome
      description: Link a milestone or epic issue. Maintainers will triage unparented reports; a parent is required before status:ready.
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: State the observable result, not an implementation diary.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the tests or observations that prove completion.
    validations:
      required: true
  - type: textarea
    id: specifications
    attributes:
      label: Specification references
      description: Link exact W3C sections and rule anchors when applicable.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: Record relevant architectural boundaries and excluded work.
